<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Puzzle Agrinho</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        .info { text-align: center; margin-bottom: 5px; }
        h2 { margin: 2px; color: #4CAF50; font-size: 20px; }
        p { margin: 2px; font-size: 12px; color: #aaa; }
        
        #container-jogo {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background-color: #222;
            border: 4px solid #2e7d32;
            max-width: 95vw;
            max-height: 55vh;
        }
        
        /* Controles estilo Minecraft de Celular (D-Pad) */
        #dpad {
            display: none; /* Escondido no PC, aparece via JS no celular */
            position: relative;
            width: 160px;
            height: 160px;
            margin-top: 15px;
        }
        .btn-dpad {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            user-select: none;
        }
        .btn-dpad:active { background-color: rgba(255, 255, 255, 0.5); }
        #btn-up { top: 0; left: 55px; }
        #btn-left { top: 55px; left: 0; }
        #btn-right { top: 55px; left: 110px; }
        #btn-down { top: 110px; left: 55px; }
    </style>
</head>
<body>
    <div class="info">
        <h2 id="level-display">Nível: 1/10</h2>
        <p>Evite os blocos vermelhos/azuis e as armadilhas invisíveis!</p>
    </div>
    
    <div id="container-jogo">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="dpad">
            <div class="btn-dpad" id="btn-up">▲</div>
            <div class="btn-dpad" id="btn-left">◀</div>
            <div class="btn-dpad" id="btn-right">▶</div>
            <div class="btn-dpad" id="btn-down">▼</div>
        </div>
    </div>

    <script src="jogo.js"></script>
</body>
</html>
