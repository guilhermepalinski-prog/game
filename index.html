<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Labirinto de Puzzle 2D</title>
    <style>
        body {
            margin: 0;
            background-color: #0b5394; /* Fundo azul estilo blueprint */
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        
        #container-jogo {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 950px;
        }

        canvas {
            background-color: #e2e8f0; /* Fundo cinza claro da área de jogo */
            border: 6px double #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Textos de status no topo esquerdo idênticos à imagem */
        #painel-status {
            position: absolute;
            left: 20px;
            top: -75px;
            text-shadow: 2px 2px #000;
            font-size: 18px;
        }
        #painel-status h2 { margin: 0 0 5px 0; color: #fff; }
        #painel-status div { margin-bottom: 5px; }

        /* D-PAD Digital à Esquerda */
        #dpad {
            display: none;
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 130px;
            height: 130px;
        }
        .btn-dpad {
            position: absolute;
            background-color: #475569;
            border: 3px solid #1e293b;
            border-radius: 6px;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            user-select: none;
        }
        #btn-up { top: 0; left: 45px; }
        #btn-left { top: 45px; left: 0; }
        #btn-right { top: 45px; left: 90px; }
        #btn-down { top: 90px; left: 45px; }

        /* Botões de Ação à Direita */
        #paineis-acao {
            display: none;
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 150px;
            height: 120px;
        }
        .btn-acao {
            position: absolute;
            background-color: #475569;
            border: 3px solid #1e293b;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 75px;
            height: 40px;
            user-select: none;
            box-shadow: 2px 2px 0px #1e293b;
        }
        #btn-acao1 { bottom: 0; left: 0; }
        #btn-acao2 { bottom: 45px; left: 35px; } /* Em cima e um pouco para a direita */

        .btn-dpad:active, .btn-acao:active { background-color: #64748b; }
    </style>
</head>
<body>

    <div id="container-jogo">
        <div id="painel-status">
            <h2 id="titulo-topo">LABIRINHO PUZZLE: NÍVEL 1/10</h2>
            <div>NÍVEL: <span id="txt-nivel">1/10</span></div>
            <div>VIDAS: <span id="txt-vidas">3</span></div>
        </div>

        <canvas id="gameCanvas" width="650" height="380"></canvas>
        
        <div id="dpad">
            <div class="btn-dpad" id="btn-up">▲</div>
            <div class="btn-dpad" id="btn-left">◀</div>
            <div class="btn-dpad" id="btn-right">▶</div>
            <div class="btn-dpad" id="btn-down">▼</div>
        </div>

        <div id="paineis-acao">
            <div class="btn-acao" id="btn-acao2">AÇÃO 2</div>
            <div class="btn-acao" id="btn-acao1">AÇÃO</div>
        </div>
    </div>

    <script src="jogo.js"></script>
</body>
</html>
