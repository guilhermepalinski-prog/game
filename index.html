<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Labirinto Hardcore - Agrinho</title>
    <style>
        body {
            margin: 0;
            background-color: #0b5394; /* Fundo azul estilo blueprint */
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: none;
            padding-top: 20px;
        }
        
        /* Painel de Status no topo */
        #painel-status {
            text-align: center;
            text-shadow: 2px 2px #000;
            font-size: 18px;
            margin-bottom: 15px;
        }
        #painel-status h2 { margin: 0 0 5px 0; color: #fff; font-size: 22px; }

        #area-canvas {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        canvas {
            background-color: #e2e8f0;
            border: 6px double #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
            max-height: 50vh;
        }
        
        /* Área dos Controles - Totalmente fora e abaixo do campo de jogo */
        #zona-controles {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 850px;
            margin-top: 25px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Joystick de Movimentação (D-PAD) */
        #dpad {
            position: relative;
            width: 150px;
            height: 150px;
        }
        .btn-dpad {
            position: absolute;
            background-color: #1e293b;
            border: 3px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            user-select: none;
            box-shadow: 0 4px 0px #0f172a;
        }
        .btn-dpad:active {
            background-color: #475569;
            transform: translateY(4px);
            box-shadow: none;
        }
        #btn-up { top: 0; left: 52px; }
        #btn-left { top: 52px; left: 0; }
        #btn-right { top: 52px; left: 104px; }
        #btn-down { top: 104px; left: 52px; }

        /* Painel de Botões de Ação */
        #paineis-acao {
            position: relative;
            width: 160px;
            height: 130px;
        }
        .btn-acao {
            position: absolute;
            background-color: #b91c1c; /* Vermelho para destacar ação */
            border: 3px solid #7f1d1d;
            border-radius: 50%; /* Redondos estilo controle clássico */
            color: white;
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            user-select: none;
            box-shadow: 0 4px 0px #450a0a;
        }
        .btn-acao:active {
            background-color: #ef4444;
            transform: translateY(4px);
            box-shadow: none;
        }
        #btn-acao1 { bottom: 10px; left: 10px; background-color: #b91c1c; border-color: #7f1d1d;}
        #btn-acao2 { top: 10px; right: 10px; background-color: #047857; border-color: #064e3b; box-shadow: 0 4px 0px #022c22;} /* Verde */
        #btn-acao2:active { background-color: #10b981; }

        /* Responsividade */
        @media (max-width: 600px) {
            #zona-controles {
                max-width: 100%;
                padding: 0 10px;
            }
            #dpad { width: 130px; height: 130px; }
            .btn-dpad { width: 40px; height: 40px; font-size: 18px; }
            #btn-up { left: 45px; }
            #btn-left { top: 45px; }
            #btn-right { top: 45px; left: 90px; }
            #btn-down { top: 90px; left: 45px; }
            
            .btn-acao { width: 50px; height: 50px; }
            #paineis-acao { width: 130px; }
        }
    </style>
</head>
<body>

    <div id="painel-status">
        <h2 id="titulo-topo">LABIRINTO INSANO: NÍVEL 1/10</h2>
        <div>NÍVEL: <span id="txt-nivel">1/10</span> | VIDAS: <span id="txt-vidas">3</span></div>
    </div>

    <div id="area-canvas">
        <canvas id="gameCanvas" width="850" height="460"></canvas>
    </div>
    
    <div id="zona-controles">
        <div id="dpad">
            <div class="btn-dpad" id="btn-up">▲</div>
            <div class="btn-dpad" id="btn-left">◀</div>
            <div class="btn-dpad" id="btn-right">▶</div>
            <div class="btn-dpad" id="btn-down">▼</div>
        </div>

        <div id="paineis-acao">
            <div class="btn-acao" id="btn-acao1">AÇÃO 1</div>
            <div class="btn-acao" id="btn-acao2">AÇÃO 2</div>
        </div>
    </div>

    <script src="jogo.js"></script>
</body>
</html>
