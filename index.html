<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogo do Agrinho</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e6f4ea; 
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Evita barras de rolagem */
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 24px;
        }
        #tela-jogo {
            border: 4px solid #2e7d32;
            background-color: #87CEEB; /* Céu azul do Terraria */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Projeto Agrinho RPG (Estilo Terraria)</h1>
    <canvas id="tela-jogo" width="600" height="400"></canvas>

    <script src="jogo.js"></script>
</body>
</html>
